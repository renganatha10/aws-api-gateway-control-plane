name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel a running deploy mid-flight

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── AWS credentials ───────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Pre-deploy health check ───────────────────────────────────────────
      - name: Pre-deploy health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.ALB_HEALTH_URL }}" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Pre-deploy health check returned $HTTP_STATUS — app may already be down"
          else
            echo "Pre-deploy health check passed (200)"
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # ── Upload static assets to CloudFront S3 ─────────────────────────────
      - name: Sync hashed assets to S3 (long cache)
        run: |
          aws s3 sync build/client/ "s3://${{ secrets.S3_ASSETS_BUCKET }}/" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      - name: Sync HTML/manifests to S3 (no cache)
        run: |
          aws s3 sync build/client/ "s3://${{ secrets.S3_ASSETS_BUCKET }}/" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "no-cache,no-store"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*.html" "/manifest.json"

      # ── Upload server artifact to S3 ──────────────────────────────────────
      - name: Upload server artifact to S3
        env:
          SHA: ${{ github.sha }}
          BUCKET: ${{ secrets.S3_ARTIFACT_BUCKET }}
        run: |
          PREFIX="s3://$BUCKET/api-portal/$SHA"
          echo "Uploading artifact to $PREFIX"

          aws s3 cp build/server/       "$PREFIX/build/server/"    --recursive
          aws s3 cp db/migrations/      "$PREFIX/db/migrations/"   --recursive
          aws s3 cp ansible/deploy.yml  "$PREFIX/ansible/deploy.yml"
          aws s3 cp package.json        "$PREFIX/package.json"
          aws s3 cp package-lock.json   "$PREFIX/package-lock.json"
          aws s3 cp ecosystem.config.cjs "$PREFIX/ecosystem.config.cjs"

          echo "Artifact upload complete"

      # ── Trigger EC2 deployment via SSM → Ansible ──────────────────────────
      - name: Trigger Ansible deployment via SSM
        env:
          SHA: ${{ github.sha }}
          BUCKET: ${{ secrets.S3_ARTIFACT_BUCKET }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json << JSON
          {
            "commands": [
              "aws s3 cp s3://${BUCKET}/api-portal/${SHA}/ansible/deploy.yml /tmp/deploy-${SHA}.yml",
              "ANSIBLE_STDOUT_CALLBACK=yaml ansible-playbook /tmp/deploy-${SHA}.yml -e 'git_sha=${SHA} artifact_bucket=${BUCKET}' 2>&1 | tee -a /var/log/api-portal/deploy-${SHA}.log; exit \${PIPESTATUS[0]}"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --timeout-seconds 600 \
            --comment "Deploy $SHA" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command ID: $COMMAND_ID"
          echo "Ansible log on EC2: /var/log/api-portal/deploy-${SHA}.log"

          # Poll until the command finishes (up to ~10 min, 15 s intervals)
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/40] Status: $STATUS"

            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                break ;;
            esac

            sleep 15
          done

          # Always print Ansible output so it appears in the Actions log
          echo "──── Ansible output ────"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true

          if [ "$STATUS" != "Success" ]; then
            echo "──── stderr ────"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text || true
            echo "Deployment failed with SSM status: $STATUS"
            exit 1
          fi

          echo "Deployment succeeded"
