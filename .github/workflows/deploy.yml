name: CI / Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'infra/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI ────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Install ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Biome ───────────────────────────────────────────────────────────
      - name: Biome check (lint + format)
        run: npm run check

      # ── Unit tests + coverage ────────────────────────────────────────────
      - name: Unit tests (with coverage)
        run: npm run test:unit:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

