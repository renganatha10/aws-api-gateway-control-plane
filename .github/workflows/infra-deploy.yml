name: Deploy Infrastructure (One-time Setup)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name (used in all stack names)'
        required: true
        default: 'prod'
      cognito_domain_prefix:
        description: 'Globally unique Cognito domain prefix (e.g. api-portal-123456789012)'
        required: true
      instance_type:
        description: 'EC2 instance type'
        required: true
        default: 't3.small'
        type: choice
        options:
          - t3.small
          - t3.medium
          - t3.large

jobs:
  deploy-infra:
    name: Deploy All Infrastructure Stacks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV: ${{ github.event.inputs.environment }}
      REGION: ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── Stack 0 — Cognito ──────────────────────────────────────────────────
      - name: "Stack 0 | Deploy Cognito"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-cognito" \
            --template-file infra/cognito.yaml \
            --parameter-overrides \
              PoolName=api-gateway-portal \
              DomainPrefix=${{ github.event.inputs.cognito_domain_prefix }} \
            --region $REGION

          COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-cognito" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' \
            --output text)
          echo "::add-mask::$COGNITO_USER_POOL_ID"
          echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> $GITHUB_ENV

          COGNITO_USER_POOL_ARN=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-cognito" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`UserPoolArn`].OutputValue' \
            --output text)
          echo "COGNITO_USER_POOL_ARN=$COGNITO_USER_POOL_ARN" >> $GITHUB_ENV

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-cognito" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AppClientId`].OutputValue' \
            --output text)
          echo "::add-mask::$COGNITO_CLIENT_ID"
          echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> $GITHUB_ENV

          COGNITO_CLIENT_SECRET=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-cognito" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AppClientSecret`].OutputValue' \
            --output text)
          echo "::add-mask::$COGNITO_CLIENT_SECRET"
          echo "COGNITO_CLIENT_SECRET=$COGNITO_CLIENT_SECRET" >> $GITHUB_ENV

          TOKEN_URL=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-cognito" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`TokenUrl`].OutputValue' \
            --output text)
          echo "TOKEN_URL=$TOKEN_URL" >> $GITHUB_ENV

      # ── Stack 1 — VPC ──────────────────────────────────────────────────────
      - name: "Stack 1 | Deploy VPC"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-vpc" \
            --template-file infra/1-vpc.yaml \
            --parameter-overrides EnvironmentName=$ENV \
            --region $REGION \
            --capabilities CAPABILITY_NAMED_IAM

      # ── Step 2 — DB password ───────────────────────────────────────────────
      - name: "Step 2 | Generate DB password and store in SSM (skips if already set)"
        run: |
          if ! aws ssm get-parameter --name "/api-portal/$ENV/db-password" --region $REGION &>/dev/null; then
            DB_PASSWORD=$(openssl rand -base64 32 | tr -d '/+=')
            aws ssm put-parameter \
              --name "/api-portal/$ENV/db-password" \
              --type SecureString \
              --value "$DB_PASSWORD" \
              --region $REGION
            echo "DB password created."
          else
            echo "DB password already exists in SSM — skipping generation."
          fi

          # Always read back the stored value so later steps have it
          DB_PASSWORD=$(aws ssm get-parameter \
            --name "/api-portal/$ENV/db-password" \
            --with-decryption \
            --query Parameter.Value \
            --output text \
            --region $REGION)
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      # ── Stack 3 — Database ─────────────────────────────────────────────────
      - name: "Stack 3 | Deploy Database (Aurora Serverless v2)"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-database" \
            --template-file infra/2-database.yaml \
            --parameter-overrides EnvironmentName=$ENV \
            --region $REGION \
            --capabilities CAPABILITY_NAMED_IAM

          DB_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-database" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterEndpoint`].OutputValue' \
            --output text)
          echo "DB_ENDPOINT=$DB_ENDPOINT" >> $GITHUB_ENV

      # ── Stack 4 — Storage + CloudFront (us-east-1, placeholder ALB) ───────
      - name: "Stack 4 | Deploy Storage + CloudFront (us-east-1)"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-storage" \
            --template-file infra/4-storage.yaml \
            --parameter-overrides \
              EnvironmentName=$ENV \
              AlbDnsName="placeholder.example.com" \
            --region us-east-1

          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-storage" --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ArtifactBucketName`].OutputValue' \
            --output text)
          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET" >> $GITHUB_ENV

          ASSETS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-storage" --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`AssetsBucketName`].OutputValue' \
            --output text)
          echo "ASSETS_BUCKET=$ASSETS_BUCKET" >> $GITHUB_ENV

          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-storage" --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          echo "CF_DIST_ID=$CF_DIST_ID" >> $GITHUB_ENV

      # ── Stack 5 — IAM ──────────────────────────────────────────────────────
      - name: "Stack 5 | Deploy IAM users + policies"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-iam" \
            --template-file infra/6-iam.yaml \
            --parameter-overrides \
              EnvironmentName=$ENV \
              ArtifactBucketName=$ARTIFACT_BUCKET \
              AssetsBucketName=$ASSETS_BUCKET \
              CognitoUserPoolArn=$COGNITO_USER_POOL_ARN \
            --region $REGION \
            --capabilities CAPABILITY_NAMED_IAM

          APP_KEY_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-iam" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AppUserKeyId`].OutputValue' \
            --output text)
          echo "::add-mask::$APP_KEY_ID"
          echo "APP_KEY_ID=$APP_KEY_ID" >> $GITHUB_ENV

          APP_SECRET=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-iam" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AppUserSecretKey`].OutputValue' \
            --output text)
          echo "::add-mask::$APP_SECRET"
          echo "APP_SECRET=$APP_SECRET" >> $GITHUB_ENV

          CICD_KEY_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-iam" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`CICDUserKeyId`].OutputValue' \
            --output text)
          echo "::add-mask::$CICD_KEY_ID"
          echo "CICD_KEY_ID=$CICD_KEY_ID" >> $GITHUB_ENV

          CICD_SECRET=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-iam" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`CICDUserSecretKey`].OutputValue' \
            --output text)
          echo "::add-mask::$CICD_SECRET"
          echo "CICD_SECRET=$CICD_SECRET" >> $GITHUB_ENV

      # ── Stack 6 — Compute (EC2 + ALB) ─────────────────────────────────────
      - name: "Stack 6 | Deploy Compute (EC2 + ALB)"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-compute" \
            --template-file infra/3-compute.yaml \
            --parameter-overrides \
              EnvironmentName=$ENV \
              InstanceType=${{ github.event.inputs.instance_type }} \
              ArtifactBucketName=$ARTIFACT_BUCKET \
            --region $REGION \
            --capabilities CAPABILITY_NAMED_IAM

          EC2_INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-compute" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`EC2InstanceId`].OutputValue' \
            --output text)
          echo "EC2_INSTANCE_ID=$EC2_INSTANCE_ID" >> $GITHUB_ENV

          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-compute" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
            --output text)
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV

      # ── Stack 4b — Update CloudFront with real ALB DNS ─────────────────────
      - name: "Stack 4b | Update CloudFront origin with real ALB DNS"
        run: |
          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-storage" \
            --template-file infra/4-storage.yaml \
            --parameter-overrides \
              EnvironmentName=$ENV \
              AlbDnsName=$ALB_DNS \
            --region us-east-1

      # ── Stack 7 — WAF (us-east-1) ─────────────────────────────────────────
      - name: "Stack 7 | Deploy WAF (us-east-1, Count mode)"
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          CF_ARN="arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${CF_DIST_ID}"

          aws cloudformation deploy \
            --stack-name "api-portal-$ENV-waf" \
            --template-file infra/5-waf.yaml \
            --parameter-overrides \
              EnvironmentName=$ENV \
              CloudFrontDistributionArn=$CF_ARN \
              RulesMode=Count \
            --region us-east-1

      # ── Step 8 — App env parameter ─────────────────────────────────────────
      - name: "Step 8 | Write app env to SSM Parameter Store (preserves existing session secret)"
        run: |
          # Reuse existing session secret to avoid invalidating active sessions
          if aws ssm get-parameter --name "/api-portal/env" --region $REGION &>/dev/null; then
            SESSION_SECRET=$(aws ssm get-parameter \
              --name "/api-portal/env" \
              --with-decryption \
              --query Parameter.Value \
              --output text \
              --region $REGION | python3 -c "import json,sys; print(json.load(sys.stdin)['SESSION_SECRET'])")
            echo "Reusing existing SESSION_SECRET."
          else
            SESSION_SECRET=$(openssl rand -base64 32)
            echo "Generated new SESSION_SECRET."
          fi
          echo "::add-mask::$SESSION_SECRET"

          aws ssm put-parameter \
            --name "/api-portal/env" \
            --type SecureString \
            --overwrite \
            --region $REGION \
            --value "{
              \"DATABASE_URL\": \"postgresql://apiportal:${DB_PASSWORD}@${DB_ENDPOINT}:5432/apiportal\",
              \"SESSION_SECRET\": \"${SESSION_SECRET}\",
              \"NODE_ENV\": \"production\",
              \"PORT\": \"3000\",
              \"AWS_REGION\": \"${REGION}\",
              \"AWS_ACCESS_KEY_ID\": \"${APP_KEY_ID}\",
              \"AWS_SECRET_ACCESS_KEY\": \"${APP_SECRET}\",
              \"COGNITO_USER_POOL_ID\": \"${COGNITO_USER_POOL_ID}\",
              \"COGNITO_USER_POOL_ARN\": \"${COGNITO_USER_POOL_ARN}\",
              \"COGNITO_CLIENT_ID\": \"${COGNITO_CLIENT_ID}\",
              \"COGNITO_CLIENT_SECRET\": \"${COGNITO_CLIENT_SECRET}\"
            }"

      # ── Step 9 — SNS email subscription ───────────────────────────────────
      - name: "Step 9 | Subscribe to CloudWatch alarm alerts"
        run: |
          SNS_ARN=$(aws cloudformation describe-stacks \
            --stack-name "api-portal-$ENV-compute" --region $REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`AlarmSNSTopicArn`].OutputValue' \
            --output text)

          aws sns subscribe \
            --topic-arn "$SNS_ARN" \
            --protocol email \
            --notification-endpoint "${{ secrets.ALERT_EMAIL }}" \
            --region $REGION

          echo "Check ${{ secrets.ALERT_EMAIL }} and confirm the SNS subscription."

      # ── Step 10 — Write deploy secrets to GitHub ───────────────────────────
      - name: "Step 10 | Write deploy secrets to GitHub Actions"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set AWS_ACCESS_KEY_ID          --body "$CICD_KEY_ID"
          gh secret set AWS_SECRET_ACCESS_KEY      --body "$CICD_SECRET"
          gh secret set AWS_REGION                 --body "$REGION"
          gh secret set EC2_INSTANCE_ID            --body "$EC2_INSTANCE_ID"
          gh secret set S3_ARTIFACT_BUCKET         --body "$ARTIFACT_BUCKET"
          gh secret set S3_ASSETS_BUCKET           --body "$ASSETS_BUCKET"
          gh secret set CLOUDFRONT_DISTRIBUTION_ID --body "$CF_DIST_ID"
          gh secret set ALB_HEALTH_URL             --body "http://$ALB_DNS/health"

          echo "All 8 deploy secrets written. You can now run the 'Deploy to EC2' workflow."
