name: Teardown Infrastructure (Manual)

# Manual-only — never triggered by push. Requires typing the env name as a
# confirmation to prevent accidental nukes.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down (prod or staging)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      confirm:
        description: 'Type the environment name exactly to confirm (e.g. "prod")'
        required: true
      region:
        description: 'AWS region'
        required: true
        default: 'ap-south-1'

concurrency:
  group: teardown-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  teardown:
    name: "Teardown ${{ github.event.inputs.environment }}"
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Confirm environment name
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "::error::Confirmation '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'."
            exit 1
          fi
          echo "Confirmed teardown of '${{ github.event.inputs.environment }}'."

      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Run teardown script
        run: |
          chmod +x infra/teardown.sh
          ./infra/teardown.sh "${{ github.event.inputs.environment }}" "${{ github.event.inputs.region }}"
