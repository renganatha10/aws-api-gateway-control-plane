AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Single-instance PostgreSQL RDS (db.t3.micro) in private subnets — sandbox tier.
  DATABASE_URL must be updated in SSM /api-portal/<env>/env after deploy with the new endpoint.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod

  DBName:
    Type: String
    Default: apiportal

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium

Resources:

  # ── DB Subnet Group ────────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for PostgreSQL RDS
      SubnetIds:
        - Fn::ImportValue: !Sub "api-portal-${EnvironmentName}-private-subnet-a"
        - Fn::ImportValue: !Sub "api-portal-${EnvironmentName}-private-subnet-b"

  # ── PostgreSQL RDS Instance ────────────────────────────────────────────────
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBName: !Ref DBName
      Engine: postgres
      EngineVersion: "16.6"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp2
      StorageEncrypted: true
      MasterUsername: apiportal
      # Parameter must exist before stack deploy:
      #   aws ssm put-parameter --name /api-portal/<env>/db-password --type SecureString --value <password>
      MasterUserPassword: !Sub "{{resolve:ssm-secure:/api-portal/${EnvironmentName}/db-password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - Fn::ImportValue: !Sub "api-portal-${EnvironmentName}-sg-db"
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "02:00-03:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      EnableCloudwatchLogsExports:
        - postgresql
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── CloudWatch log group ───────────────────────────────────────────────────
  DBLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/rds/instance/api-portal-${EnvironmentName}/postgresql"
      RetentionInDays: 30

Outputs:
  # After deploy, update DATABASE_URL in SSM /api-portal/<env>/env:
  #   postgresql://apiportal:<password>@<DBEndpoint>:5432/apiportal

  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-db-endpoint"

  DBPort:
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-db-port"
