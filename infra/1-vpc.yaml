AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VPC with public/private subnets, NAT Gateway, and security groups
  for the API Portal. Deploy once per environment.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

Mappings:
  CidrMap:
    VPC:         { CIDR: "10.0.0.0/16" }
    PublicA:     { CIDR: "10.0.1.0/24" }
    PublicB:     { CIDR: "10.0.2.0/24" }
    PrivateA:    { CIDR: "10.0.10.0/24" }
    PrivateB:    { CIDR: "10.0.11.0/24" }

Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !FindInMap [CidrMap, VPC, CIDR]
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── Subnets ────────────────────────────────────────────────────────────────
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [CidrMap, PublicA, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [CidrMap, PublicB, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-public-b"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [CidrMap, PrivateA, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-private-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [CidrMap, PrivateB, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-private-b"

  # ── NAT Gateway (single, in AZ-A) ─────────────────────────────────────────
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-nat"

  # ── Route tables ───────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ── Security groups ────────────────────────────────────────────────────────
  # ALB: accepts 443 from CloudFront prefix list + 80 (redirect only)
  SGAlb:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - accept HTTPS from CloudFront
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"   # redirect to HTTPS; WAF blocks before ALB
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-sg-alb"

  # EC2: accepts :3000 from ALB only, plus SSM (no SSH port needed)
  SGEc2:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 - app traffic from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref SGAlb
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-sg-ec2"

  # DB: accepts Postgres from EC2 only
  SGDb:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora - accept Postgres from EC2 only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref SGEc2
      Tags:
        - Key: Name
          Value: !Sub "api-portal-${EnvironmentName}-sg-db"

Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-vpc-id"

  PublicSubnetA:
    Value: !Ref PublicSubnetA
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-public-subnet-a"

  PublicSubnetB:
    Value: !Ref PublicSubnetB
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-public-subnet-b"

  PrivateSubnetA:
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-private-subnet-a"

  PrivateSubnetB:
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-private-subnet-b"

  SGAlbId:
    Value: !Ref SGAlb
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-sg-alb"

  SGEc2Id:
    Value: !Ref SGEc2
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-sg-ec2"

  SGDbId:
    Value: !Ref SGDb
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-sg-db"
