AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Cognito User Pool for the API Gateway management portal.
  Provisions the User Pool, hosted-UI domain, and a portal app client that
  uses the USER_PASSWORD_AUTH + SECRET_HASH flow.  The same User Pool is
  used at runtime to create machine-to-machine app clients (client_credentials)
  for each consumer — those are managed by the application, not this stack.

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:

  PoolName:
    Type: String
    Default: api-gateway-portal
    Description: Display name for the Cognito User Pool.

  DomainPrefix:
    Type: String
    Description: >
      Globally-unique prefix for the Cognito hosted-UI domain.
      Becomes: https://<prefix>.auth.<region>.amazoncognito.com
      Use lowercase letters, numbers, and hyphens only.
    AllowedPattern: "^[a-z0-9][a-z0-9-]{2,61}[a-z0-9]$"
    ConstraintDescription: "3-63 chars: lowercase letters, numbers, hyphens; cannot start or end with a hyphen."

  PortalClientName:
    Type: String
    Default: portal-admin
    Description: Name for the portal app client (used for admin login).

  AccessTokenValidityHours:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 24
    Description: Access/ID token lifetime in hours.

  RefreshTokenValidityDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    Description: Refresh token lifetime in days.

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  # ── User Pool ──────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref PoolName

      # Email is the username.  Users sign in with their email address.
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false

      # Standard profile attributes needed by the portal.
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: false
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: false
          Mutable: true

      # Email must be verified so the forgot-password flow works.
      AutoVerifiedAttributes:
        - email

      # Portal creates users via AdminCreateUser + AdminSetUserPassword —
      # no self-service sign-up needed.
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "Your API Gateway Portal account"
          EmailMessage: >
            You have been invited to the API Gateway Portal.
            Username: {username}
            Temporary password: {####}
            Please sign in and change it.

      # Password policy matches the error message surfaces in the UI.
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7

      # Account recovery via verified email only.
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

      MfaConfiguration: "OFF"

      # Email delivery — Cognito's built-in SES sandbox is fine for low volume.
      # Replace with a custom SES configuration if you need higher throughput.
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT

      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT   # logs anomalies without blocking; switch to ENFORCED for production

  # ── Hosted UI Domain ───────────────────────────────────────────────────────
  #
  # The hosted domain is required for the OAuth2 token endpoint used by
  # machine-to-machine clients (consumer client_credentials flow).
  # Token URL:  https://<DomainPrefix>.auth.<Region>.amazoncognito.com/oauth2/token

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  # ── Portal App Client ──────────────────────────────────────────────────────
  #
  # Used by the portal server for:
  #   - Admin login  (InitiateAuth / USER_PASSWORD_AUTH)
  #   - Forgot / reset password  (ForgotPassword + ConfirmForgotPassword)
  #
  # GenerateSecret: true  →  the server computes SECRET_HASH = HMAC-SHA256(username + clientId, clientSecret)
  # No OAuth flows configured — this client never participates in the hosted-UI
  # redirect flow; only the server-side SDK calls use it.

  PortalAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: UserPoolDomain
    Properties:
      ClientName: !Ref PortalClientName
      UserPoolId: !Ref UserPool
      GenerateSecret: true

      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH    # direct password exchange (no SRP)
        - ALLOW_REFRESH_TOKEN_AUTH    # token refresh

      # No OAuth2 authorization-code or implicit flows for this client.
      AllowedOAuthFlowsUserPoolClient: false

      SupportedIdentityProviders:
        - COGNITO

      # Token lifetimes
      AccessTokenValidity: !Ref AccessTokenValidityHours
      IdTokenValidity: !Ref AccessTokenValidityHours
      RefreshTokenValidity: !Ref RefreshTokenValidityDays
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

      # Hides "user does not exist" vs "wrong password" distinction from callers.
      PreventUserExistenceErrors: ENABLED

      # Read attributes the portal uses from the ID token.
      ReadAttributes:
        - email
        - given_name
        - family_name
        - email_verified

      WriteAttributes:
        - email
        - given_name
        - family_name

# ── Outputs ───────────────────────────────────────────────────────────────────
#
# Copy these values into the /api-portal/env SSM Parameter Store SecureString.
#
#   COGNITO_USER_POOL_ID   = UserPoolId
#   COGNITO_USER_POOL_ARN  = UserPoolArn
#   COGNITO_CLIENT_ID      = AppClientId
#   COGNITO_CLIENT_SECRET  = AppClientSecret
#
# Note: AppClientSecret is visible in CloudFormation outputs and via the API.
# Restrict cloudformation:DescribeStacks on this stack to ops accounts only.

Outputs:

  UserPoolId:
    Description: "COGNITO_USER_POOL_ID — set this in your app environment"
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolArn:
    Description: "COGNITO_USER_POOL_ARN — injected into every API spec as the CognitoAuth provider ARN"
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolArn"

  AppClientId:
    Description: "COGNITO_CLIENT_ID — portal app client ID"
    Value: !Ref PortalAppClient
    Export:
      Name: !Sub "${AWS::StackName}-AppClientId"

  AppClientSecret:
    Description: "COGNITO_CLIENT_SECRET — portal app client secret (used for SECRET_HASH)"
    Value: !GetAtt PortalAppClient.ClientSecret
    Export:
      Name: !Sub "${AWS::StackName}-AppClientSecret"

  TokenUrl:
    Description: >
      OAuth2 token endpoint — stored on each consumer record as token_url.
      Machine clients call this with client_credentials grant.
    Value: !Sub "https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
    Export:
      Name: !Sub "${AWS::StackName}-TokenUrl"

  HostedUiBaseUrl:
    Description: Cognito hosted UI base URL (for reference)
    Value: !Sub "https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "${AWS::StackName}-HostedUiBaseUrl"
