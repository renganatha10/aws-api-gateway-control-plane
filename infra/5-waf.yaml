AWSTemplateFormatVersion: "2010-09-09"
Description: >
  WAF WebACL attached to CloudFront.
  MUST be deployed in us-east-1 (CloudFront WAFs are global/us-east-1 only).

  Deploy order:
    1. Deploy in Count mode (all rules set to Count).
    2. Review sampled requests in WAF console for 1-2 weeks.
    3. Flip RulesMode param to Block.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod

  CloudFrontDistributionArn:
    Type: String
    Description: >
      ARN of the CloudFront distribution to attach this WebACL to.
      Format: arn:aws:cloudfront::<account-id>:distribution/<id>

  # Start in Count, switch to Block after tuning period
  RulesMode:
    Type: String
    Default: Count
    AllowedValues: [Count, Block]

  GlobalRateLimit:
    Type: Number
    Default: 2000
    Description: Max requests per 5 minutes per IP (across all paths)

  LoginRateLimit:
    Type: Number
    Default: 20
    Description: Max requests per 5 minutes per IP on /login

  ApiRateLimit:
    Type: Number
    Default: 500
    Description: Max requests per 5 minutes per IP on /api/*

Conditions:
  IsBlock: !Equals [!Ref RulesMode, "Block"]

Resources:

  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "api-portal-${EnvironmentName}-webacl"
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "api-portal-${EnvironmentName}-webacl"

      Rules:

        # Priority 1 — IP Reputation (AWS Managed)
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 1
          OverrideAction:
            !If
              - IsBlock
              - None: {}
              - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: IpReputation
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList

        # Priority 2 — Core Rule Set (OWASP Top 10)
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          OverrideAction:
            !If
              - IsBlock
              - None: {}
              - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CRS
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet

        # Priority 3 — Known Bad Inputs (Log4Shell, Spring4Shell, SSRF)
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          OverrideAction:
            !If
              - IsBlock
              - None: {}
              - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputs
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet

        # Priority 5 — Global rate limit
        - Name: RateLimitGlobal
          Priority: 5
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitGlobal
          Statement:
            RateBasedStatement:
              Limit: !Ref GlobalRateLimit
              AggregateKeyType: IP

        # Priority 6 — Login endpoint rate limit
        - Name: RateLimitLogin
          Priority: 6
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitLogin
          Statement:
            RateBasedStatement:
              Limit: !Ref LoginRateLimit
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: "/login"
                  TextTransformations:
                    - Priority: 0
                      Type: LOWERCASE

        # Priority 7 — API path rate limit
        - Name: RateLimitApi
          Priority: 7
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitApi
          Statement:
            RateBasedStatement:
              Limit: !Ref ApiRateLimit
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: "/api/"
                  TextTransformations:
                    - Priority: 0
                      Type: LOWERCASE

        # Priority 9 — Large payload block (> 8 KB body)
        - Name: BlockOversizedBody
          Priority: 9
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: OversizedBody
          Statement:
            SizeConstraintStatement:
              FieldToMatch:
                Body:
                  OversizeHandling: MATCH
              ComparisonOperator: GT
              Size: 8192
              TextTransformations:
                - Priority: 0
                  Type: NONE

  # ── Attach WebACL to CloudFront distribution ───────────────────────────────
  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      WebACLArn: !GetAtt WebACL.Arn
      ResourceArn: !Ref CloudFrontDistributionArn

  # ── WAF logging to CloudWatch ──────────────────────────────────────────────
  WAFLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # WAF log group MUST be named aws-waf-logs-*
      LogGroupName: !Sub "aws-waf-logs-api-portal-${EnvironmentName}"
      RetentionInDays: 90

  WAFLoggingConfig:
    Type: AWS::WAFv2::LoggingConfiguration
    Properties:
      ResourceArn: !GetAtt WebACL.Arn
      LogDestinationConfigs:
        - !GetAtt WAFLogGroup.Arn
      RedactedFields:
        - SingleHeader:
            Name: authorization
        - SingleHeader:
            Name: cookie

Outputs:
  WebACLArn:
    Value: !GetAtt WebACL.Arn
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-webacl-arn"
