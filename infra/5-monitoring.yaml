peration_duration_seconds_bucket[$__rate_interval]))) * 1000","legendFormat":"{{db_operation_name}}","refId":"A"}],"options":{"tooltip":{"mode":"multi","sort":"none"},"legend":{"displayMode":"list","placement":"bottom","showLegend":true}},"fieldConfig":{"defaults":{"unit":"ms","color":{"mode":"palette-classic"},"custom":{"lineWidth":1,"fillOpacity":5,"gradientMode":"none","showPoints":"never","spanNulls":false}},"overrides":[]}},{"id":15,"title":"DB Connection Pool","type":"timeseries","gridPos":{"h":8,"w":8,"x":16,"y":23},"datasource":{"type":"prometheus","uid":"${datasource}"},"targets":[{"datasource":{"type":"prometheus","uid":"${datasource}"},"expr":"db_client_connection_count{db_client_connection_state=\"idle\"}","legendFormat":"idle","refId":"A"},{"datasource":{"type":"prometheus","uid":"${datasource}"},"expr":"db_client_connection_count{db_client_connection_state=\"used\"}","legendFormat":"used","refId":"B"},{"datasource":{"type":"prometheus","uid":"${datasource}"},"expr":"db_client_connection_pending_requests","legendFormat":"pending","refId":"C"}],"options":{"tooltip":{"mode":"multi","sort":"none"},"legend":{"displayMode":"list","placement":"bottom","showLegend":true}},"fieldConfig":{"defaults":{"unit":"short","color":{"mode":"palette-classic"},"custom":{"lineWidth":1,"fillOpacity":10,"gradientMode":"none","showPoints":"never","spanNulls":false}},"overrides":[{"matcher":{"id":"byName","options":"idle"},"properties":[{"id":"color","value":{"fixedColor":"green","mode":"fixed"}}]},{"matcher":{"id":"byName","options":"used"},"properties":[{"id":"color","value":{"fixedColor":"blue","mode":"fixed"}}]},{"matcher":{"id":"byName","options":"pending"},"properties":[{"id":"color","value":{"fixedColor":"orange","mode":"fixed"}}]}]}},{"id":16,"title":"Node.js Runtime","type":"row","gridPos":{"h":1,"w":24,"x":0,"y":31},"collapsed":false,"panels":[]},{"id":17,"title":"Event Loop Delay","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":32},"datasource":{"type":"prometh