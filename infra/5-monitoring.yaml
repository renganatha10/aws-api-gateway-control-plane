","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":41},"datasource":{"type":"prometheus","uid":"${datasource}"},"targets":[{"datasource":{"type":"prometheus","uid":"${datasource}"},"expr":"sum by (v8js_heap_space_name) (v8js_memory_heap_used_bytes{v8js_heap_space_name=~\"old_space|new_space|code_space|large_object_space\"})","legendFormat":"{{v8js_heap_space_name}}","refId":"A"}],"options":{"tooltip":{"mode":"multi","sort":"none"},"legend":{"displayMode":"list","placement":"bottom","showLegend":true}},"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"palette-classic"},"custom":{"lineWidth":1,"fillOpacity":10,"gradientMode":"none","showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"normal"}}},"overrides":[]}},{"id":21,"title":"GC Duration Rate","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":41},"datasource":{"type":"prometheus","uid":"${datasource}"},"targets":[{"datasource":{"type":"prometheus","uid":"${datasource}"},"expr":"sum by (v8js_gc_type) (rate(v8js_gc_duration_seconds_sum[$__rate_interval]))","legendFormat":"{{v8js_gc_type}}","refId":"A"}],"options":{"tooltip":{"mode":"multi","sort":"none"},"legend":{"displayMode":"list","placement":"bottom","showLegend":true}},"fieldConfig":{"defaults":{"unit":"s","color":{"mode":"palette-classic"},"custom":{"lineWidth":1,"fillOpacity":10,"gradientMode":"none","showPoints":"never","spanNulls":false}},"overrides":[]}}]}
          GFJSON

          echo "=== Monitoring EC2 bootstrap complete ==="

Outputs:
  MonitoringInstanceId:
    Value: !Ref MonitoringInstance

  PublicIp:
    Value: !Ref MonitoringEIP
    Description: Stable public IP of the monitoring EC2

  GrafanaUrl:
    Value: !Sub "http://${MonitoringEIP}:3000"
    Description: Grafana — log in as admin (password in SSM /api-portal/${EnvironmentName}/grafana-admin-password)

  PrometheusUrl:
    Value: !Sub "http://${MonitoringEIP}:9090"
    Description: Prometheus UI
