AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ACM certificate for a custom API Gateway domain.
  Deploy this stack once per custom domain (or once with a wildcard, e.g. *.yourdomain.com,
  to reuse the same certificate across all subdomains).
  After deployment, copy the CertificateArn output and paste it into the New Domain form
  in the API Gateway portal.

  DNS validation:
    After deploying, the certificate stays in PENDING_VALIDATION until you add the
    DNS validation CNAME in your DNS provider (e.g. GoDaddy).
    Open AWS Certificate Manager → find the certificate → expand "Domain validation"
    to get the CNAME name and value, then add it as a CNAME record in GoDaddy.
    Validation normally completes within a few minutes.

  Region requirements:
    - REGIONAL endpoint: deploy this stack in the SAME region as your API Gateway.
        aws cloudformation deploy --region ap-south-1 ...
    - EDGE endpoint (CloudFront): deploy this stack in us-east-1.
        aws cloudformation deploy --region us-east-1 ...

  Deployment example:
    aws cloudformation deploy \
      --template-file infra/acm-certificate.yaml \
      --stack-name acm-cert-api-example-com \
      --parameter-overrides DomainName=api.example.com EndpointType=REGIONAL \
      --region ap-south-1

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:

  DomainName:
    Type: String
    Description: >
      The custom domain name to certify.
      Use an exact domain (e.g. api.example.com) for a single cert, or a wildcard
      (e.g. *.example.com) to cover all subdomains with one certificate.
      Wildcards can be reused across multiple custom domains by pasting the same ARN.
    AllowedPattern: "^(\\*\\.)?[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?(\\.[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?)+$"
    ConstraintDescription: "A valid fully-qualified domain name or wildcard (e.g. api.example.com or *.example.com)."

  EndpointType:
    Type: String
    Default: REGIONAL
    AllowedValues:
      - REGIONAL
      - EDGE
    Description: >
      Must match the endpoint type you will select in the API Gateway portal when creating
      the custom domain.
      REGIONAL: deploy this stack in the same region as your API Gateway.
      EDGE: deploy this stack in us-east-1 regardless of gateway region.

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  Certificate:
    Type: AWS::CertificateManager::Certificate
    DeletionPolicy: Retain       # keep the cert alive if the stack is deleted
    UpdateReplacePolicy: Retain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      Tags:
        - Key: EndpointType
          Value: !Ref EndpointType
        - Key: ManagedBy
          Value: api-gateway-portal

# ── Outputs ───────────────────────────────────────────────────────────────────
#
# Copy CertificateArn into the "Certificate ARN" field on the New Domain form.

Outputs:

  CertificateArn:
    Description: >
      ACM certificate ARN — paste this into the Certificate ARN field when creating
      a custom domain in the API Gateway portal.
    Value: !Ref Certificate
    Export:
      Name: !Sub "${AWS::StackName}-CertificateArn"

  DomainName:
    Description: The domain name this certificate was issued for.
    Value: !Ref DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DomainName"
