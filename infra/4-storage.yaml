AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 buckets (assets + artifacts) and CloudFront distribution.
  Stack exports the distribution ID and asset bucket name for the CI workflow.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod

  # The ALB DNS name to use as the SSR origin (e.g. api-portal-alb-xxx.ap-south-1.elb.amazonaws.com)
  AlbDnsName:
    Type: String
    Description: ALB DNS name (output from stack 3-compute)

Resources:

  # ── S3: static assets (CloudFront origin) ─────────────────────────────────
  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "api-portal-${EnvironmentName}-assets-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-versions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── S3: deployment artifacts ───────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "api-portal-${EnvironmentName}-artifacts-${AWS::AccountId}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── Origin Access Control ──────────────────────────────────────────────────
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "api-portal-${EnvironmentName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AssetsBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # ── CloudFront distribution ────────────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Comment: !Sub "api-portal-${EnvironmentName}"

        ViewerCertificate:
          CloudFrontDefaultCertificate: true

        Origins:
          # Origin 1 — S3 static assets
          - Id: s3-assets
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref OAC

          # Origin 2 — ALB (SSR + API)
          - Id: alb-ssr
            DomainName: !Ref AlbDnsName
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]

        DefaultCacheBehavior:
          TargetOriginId: alb-ssr
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: true

        CacheBehaviors:
          # Hashed assets — serve from S3 with long TTL
          - PathPattern: "/assets/*"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (1 year)
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          - PathPattern: "/_build/*"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          - PathPattern: "/favicon.ico"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

        Logging:
          Bucket: !GetAtt ArtifactBucket.DomainName  # reuse artifact bucket for CF logs
          Prefix: cloudfront-logs/

Outputs:
  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-cf-distribution-id"

  DistributionDomain:
    Value: !GetAtt Distribution.DomainName
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-cf-domain"

  AssetsBucketName:
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-assets-bucket"

  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-artifact-bucket"
