AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 buckets (assets + artifacts) and CloudFront distribution.
  CloudFront serves ONLY static assets from S3 via static.rengaonline.in.
  The ALB (api-manager.rengaonline.in) is the entry point for all SSR traffic
  and is NOT an origin in this distribution.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod

  # ACM certificate for static.rengaonline.in — MUST be in us-east-1 (CloudFront requirement).
  # Created by infra/cert-manager.sh; ARN stored in SSM /api-portal/certs/static.
  StaticCertArn:
    Type: String
    Default: ""
    Description: >
      ACM certificate ARN for static.rengaonline.in (us-east-1).
      Leave empty to use the default CloudFront certificate (*.cloudfront.net).

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref StaticCertArn, ""]]

Resources:

  # ── S3: static assets (CloudFront origin) ─────────────────────────────────
  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "api-portal-${EnvironmentName}-assets-${AWS::Region}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-versions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── S3: deployment artifacts ───────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "api-portal-${EnvironmentName}-artifacts-${AWS::Region}-${AWS::AccountId}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── Origin Access Control ──────────────────────────────────────────────────
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "api-portal-${EnvironmentName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AssetsBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # ── CloudFront distribution — S3 assets only ──────────────────────────────
  # This distribution exists solely to serve content-hashed static assets
  # (JS, CSS, images) from S3 via https://static.rengaonline.in.
  # All SSR / API traffic goes directly to the ALB (api-manager.rengaonline.in).
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Comment: !Sub "api-portal-${EnvironmentName} static assets"

        # When StaticCertArn is provided: serve via static.rengaonline.in with TLS 1.2+.
        # When empty: fall back to the default *.cloudfront.net certificate.
        Aliases: !If
          - HasCustomDomain
          - [static.rengaonline.in]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref StaticCertArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

        Origins:
          # Only origin: S3 assets bucket.
          # Vite content-hashes all filenames so cache-busting is automatic.
          - Id: s3-assets
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref OAC

        # Default behavior — all paths served from S3 with long cache.
        # Vite hashes every asset filename, so there is no stale-cache problem.
        DefaultCacheBehavior:
          TargetOriginId: s3-assets
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (1 year)
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true

        CacheBehaviors:
          # Explicit long-cache rules kept for clarity; they match the same policy
          # as the default behavior above — the specificity is a no-op in practice.
          - PathPattern: "/assets/*"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          - PathPattern: "/_build/*"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          # favicon and error SVG: keep no-cache so changes apply immediately
          - PathPattern: "/favicon.ico"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          - PathPattern: "/server-error.svg"
            TargetOriginId: s3-assets
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

        Logging:
          Bucket: !GetAtt ArtifactBucket.DomainName
          Prefix: cloudfront-logs/

Outputs:
  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-cf-distribution-id"

  DistributionDomain:
    Value: !GetAtt Distribution.DomainName
    Description: >
      CloudFront domain for the asset CDN.
      Add a CNAME in GoDaddy: static.rengaonline.in → this value.
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-cf-domain"

  AssetsBucketName:
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-assets-bucket"

  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "api-portal-${EnvironmentName}-artifact-bucket"
