AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Teardown orchestrator for the api-portal infrastructure.

  Deploying this stack fires Lambda-backed Custom Resources that delete each
  infra stack in reverse-dependency order.  After all stacks are gone, delete
  this teardown stack itself to clean up the Lambda and IAM role.

  Deletion order (enforced by DependsOn):
    1. IAM stack          — no cross-stack imports consumed by others
    2. Cognito stack      — no cross-stack imports from VPC (parallel with Compute)
    3. Compute stack      — imports from VPC; must go before VPC
    4. Storage stack      — CloudFront disabled before stack delete; must go after Compute
    5. Database stack     — imports from VPC; DeletionPolicy Retain means stack deletes fast
    6. VPC stack          — last; all stacks that import from it must be gone first

  RESOURCES LEFT BEHIND (DeletionPolicy: Retain — manual cleanup required):
    Aurora DB cluster + instance  →  aws rds delete-db-cluster / delete-db-instance
    S3 AssetsBucket               →  empty, then aws s3 rb
    S3 ArtifactsBucket            →  empty, then aws s3 rb
    Cognito UserPool               →  aws cognito-idp delete-user-pool
    ACM Certificate(s)            →  aws acm delete-certificate (separate acm-certificate stacks)
    SSM Parameters                →  aws ssm delete-parameters-by-path --path /api-portal/
    CloudWatch Log Groups         →  aws logs delete-log-group (if needed)

Parameters:

  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

  VPCStackName:
    Type: String
    Default: api-portal-prod-vpc
    Description: Name of the 1-vpc.yaml stack

  DatabaseStackName:
    Type: String
    Default: api-portal-prod-database
    Description: Name of the 2-database.yaml stack

  ComputeStackName:
    Type: String
    Default: api-portal-prod-compute
    Description: Name of the 3-compute.yaml stack

  StorageStackName:
    Type: String
    Default: api-portal-prod-storage
    Description: Name of the 4-storage.yaml stack

  IAMStackName:
    Type: String
    Default: api-portal-prod-iam
    Description: Name of the 6-iam.yaml stack

  CognitoStackName:
    Type: String
    Default: api-portal-prod-cognito
    Description: Name of the cognito.yaml stack

Resources:

  # ── IAM Role for teardown Lambda ───────────────────────────────────────────
  TeardownRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "api-portal-${EnvironmentName}-teardown-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TeardownAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation: describe and delete any stack
              - Effect: Allow
                Action:
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStackResources
                Resource: "*"
              # CloudFront: disable distributions before stack delete
              - Effect: Allow
                Action:
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:UpdateDistribution
                  - cloudfront:ListDistributions
                Resource: "*"
              # Broad service permissions so CloudFormation can delete each stack's resources
              - Effect: Allow
                Action:
                  - ec2:*
                  - elasticloadbalancing:*
                  - rds:DeleteDBSubnetGroup
                  - iam:DeleteUser
                  - iam:DeleteUserPolicy
                  - iam:DetachUserPolicy
                  - iam:DeleteAccessKey
                  - iam:ListAccessKeys
                  - iam:ListAttachedUserPolicies
                  - iam:ListUserPolicies
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:ListInstanceProfilesForRole
                  - iam:DeletePolicy
                  - iam:DeletePolicyVersion
                  - iam:ListPolicyVersions
                  - iam:PassRole
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - cloudwatch:DeleteAlarms
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:ListSubscriptionsByTopic
                  - cognito-idp:DeleteUserPoolDomain
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:DescribeUserPool
                Resource: "*"

  # ── Teardown Lambda ────────────────────────────────────────────────────────
  # Handles:
  #   - Stack existence check (skip if already deleted)
  #   - CloudFront disable-before-delete for the storage stack
  #   - Stack deletion with polling (exits cleanly within 15 min)
  TeardownLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "api-portal-${EnvironmentName}-teardown"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TeardownRole.Arn
      Timeout: 840  # 14 min — leaves 60s buffer for cfnresponse
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cfn = boto3.client('cloudformation')
          # CloudFront management API is always in us-east-1
          cf_client = boto3.client('cloudfront', region_name='us-east-1')

          POLL_INTERVAL = 15  # seconds between describe_stacks calls

          def stack_exists(stack_name):
              try:
                  resp = cfn.describe_stacks(StackName=stack_name)
                  return resp['Stacks'][0]['StackStatus'] != 'DELETE_COMPLETE'
              except cfn.exceptions.ClientError as e:
                  if 'does not exist' in str(e):
                      return False
                  raise

          def disable_cloudfront_in_stack(stack_name):
              """Disable all CloudFront distributions in a stack before deletion.
              CloudFormation stack deletion can take 15-30 min if it must disable
              a distribution itself; pre-disabling here speeds up the stack delete."""
              try:
                  paginator = cfn.get_paginator('list_stack_resources')
                  resources = []
                  for page in paginator.paginate(StackName=stack_name):
                      resources.extend(page['StackResourceSummaries'])

                  distributions = [
                      r for r in resources
                      if r['ResourceType'] == 'AWS::CloudFront::Distribution'
                      and r.get('PhysicalResourceId')
                  ]

                  for dist in distributions:
                      dist_id = dist['PhysicalResourceId']
                      logger.info(f"Checking CloudFront distribution {dist_id}")
                      resp = cf_client.get_distribution_config(Id=dist_id)
                      config = resp['DistributionConfig']
                      etag = resp['ETag']

                      if not config.get('Enabled', True):
                          logger.info(f"Distribution {dist_id} already disabled")
                          continue

                      logger.info(f"Disabling distribution {dist_id}")
                      config['Enabled'] = False
                      cf_client.update_distribution(
                          DistributionConfig=config,
                          Id=dist_id,
                          IfMatch=etag,
                      )

                      # Wait for the disable to propagate (~3-8 min in practice)
                      waiter = cf_client.get_waiter('distribution_deployed')
                      waiter.wait(
                          Id=dist_id,
                          WaiterConfig={'MaxAttempts': 30, 'Delay': 15},  # 7.5 min max
                      )
                      logger.info(f"Distribution {dist_id} disabled and deployed")

              except Exception as e:
                  logger.warning(f"CloudFront pre-disable skipped: {e}")

          def delete_stack_and_wait(stack_name, context):
              if not stack_exists(stack_name):
                  logger.info(f"Stack {stack_name} does not exist — skipping")
                  return

              logger.info(f"Initiating delete of stack: {stack_name}")
              cfn.delete_stack(StackName=stack_name)

              while True:
                  remaining_ms = context.get_remaining_time_in_millis()
                  if remaining_ms < 60_000:
                      raise TimeoutError(
                          f"Stack {stack_name} deletion still in progress but Lambda is almost out of time. "
                          f"Check AWS Console and delete manually if needed."
                      )

                  try:
                      resp = cfn.describe_stacks(StackName=stack_name)
                      status = resp['Stacks'][0]['StackStatus']
                      logger.info(f"Stack {stack_name}: {status} ({remaining_ms // 1000}s remaining)")

                      if status == 'DELETE_COMPLETE':
                          logger.info(f"Stack {stack_name} deleted successfully")
                          return
                      if 'FAILED' in status:
                          reasons = [
                              r.get('ResourceStatusReason', '')
                              for r in cfn.list_stack_resources(StackName=stack_name)
                                         .get('StackResourceSummaries', [])
                              if 'FAILED' in r.get('ResourceStatus', '')
                          ]
                          raise RuntimeError(
                              f"Stack {stack_name} deletion failed ({status}). "
                              f"Reasons: {reasons}"
                          )
                  except cfn.exceptions.ClientError as e:
                      if 'does not exist' in str(e):
                          logger.info(f"Stack {stack_name} deleted successfully")
                          return
                      raise

                  time.sleep(POLL_INTERVAL)

          def handler(event, context):
              logger.info(f"RequestType={event['RequestType']} StackName={event['ResourceProperties'].get('StackName')}")
              physical_id = event.get('PhysicalResourceId', 'teardown-noop')

              # Only act on Create — Update/Delete of this teardown stack are no-ops
              if event['RequestType'] in ('Update', 'Delete'):
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
                  return

              props = event['ResourceProperties']
              stack_name = props['StackName']
              pre_disable_cf = props.get('PreDisableCloudFront', 'false').lower() == 'true'

              try:
                  if pre_disable_cf:
                      disable_cloudfront_in_stack(stack_name)
                  delete_stack_and_wait(stack_name, context)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, f"deleted-{stack_name}")
              except Exception as e:
                  logger.error(f"Teardown error: {e}", exc_info=True)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)}, physical_id)

  # ── Deletion sequence ──────────────────────────────────────────────────────
  # DependsOn enforces the order CloudFormation fires each Custom Resource.

  # Step 1 — IAM: no other stack imports its exports; safe to delete first
  DeleteIAMStack:
    Type: Custom::DeleteStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref IAMStackName

  # Step 2a — Cognito: UserPool has DeletionPolicy Retain so stack delete is fast
  #           Run in parallel with Compute (both DependsOn IAM only)
  DeleteCognitoStack:
    Type: Custom::DeleteStack
    DependsOn: DeleteIAMStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref CognitoStackName

  # Step 2b — Compute: EC2 + ALB; must delete before VPC (imports VPC subnets/SGs)
  DeleteComputeStack:
    Type: Custom::DeleteStack
    DependsOn: DeleteIAMStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref ComputeStackName

  # Step 3 — Storage: CloudFront + S3; pre-disable CF to keep deletion under 15 min
  #           S3 buckets have DeletionPolicy Retain — empty them manually afterward
  DeleteStorageStack:
    Type: Custom::DeleteStack
    DependsOn: DeleteComputeStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref StorageStackName
      PreDisableCloudFront: "true"

  # Step 4 — Database: Aurora cluster/instance have DeletionPolicy Retain so stack
  #           delete completes immediately; cluster itself stays and needs manual deletion
  DeleteDatabaseStack:
    Type: Custom::DeleteStack
    DependsOn: DeleteStorageStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref DatabaseStackName

  # Step 5 — VPC: must be last; all stacks that use Fn::ImportValue from VPC must be gone
  DeleteVPCStack:
    Type: Custom::DeleteStack
    DependsOn:
      - DeleteDatabaseStack
      - DeleteCognitoStack
    Properties:
      ServiceToken: !GetAtt TeardownLambda.Arn
      StackName: !Ref VPCStackName

Outputs:

  TeardownStatus:
    Description: >
      All stacks listed above have been deleted (or were already absent).
      Resources with DeletionPolicy Retain still exist — see template Description
      for the manual cleanup commands.
    Value: !Sub >-
      IAM=${IAMStackName}, Cognito=${CognitoStackName},
      Compute=${ComputeStackName}, Storage=${StorageStackName},
      Database=${DatabaseStackName}, VPC=${VPCStackName} — deleted
