# Ansible SSH inventory for local deployments.
# Fill in the EC2 public IP or hostname before running scripts/deploy-local.sh
#
# Get the public IP from:
#   aws ec2 describe-instances --instance-ids <EC2_INSTANCE_ID> \
#     --query 'Reservations[0].Instances[0].PublicIpAddress' --output text

[ec2]
api-portal ansible_host=<EC2_PUBLIC_IP>

[ec2:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/id_rsa   # path to your key pair .pem file
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
