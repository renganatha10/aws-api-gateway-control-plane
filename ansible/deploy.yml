---
# Runs on EC2 via SSM send-command as root, with PM2/npm tasks delegated
# to ec2-user (who owns /opt/api-portal and the PM2 daemon).
#
# Invoked by GitHub Actions:
#   ansible-playbook ansible/deploy.yml \
#     -e "git_sha=<sha> artifact_bucket=<bucket>"

- name: Deploy api-portal
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    app_dir: /opt/api-portal
    release_dir: "{{ app_dir }}/releases/{{ git_sha }}"
    current_link: "{{ app_dir }}/current"
    app_user: ec2-user
    ssm_param: /api-portal/env

  tasks:

    - name: "0/7 | Log deployment context"
      command: whoami
      register: _whoami
      changed_when: false

    - name: "0/7 | Deployment context"
      debug:
        msg: "ansible user={{ _whoami.stdout }} | app_user={{ app_user }} | sha={{ git_sha }}"

    # ══════════════════════════════════════════════════════════════════════
    # Phase 1 — Download
    # ══════════════════════════════════════════════════════════════════════

    - name: "1/7 | Create release directory"
      file:
        path: "{{ release_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: "1/7 | Download artifact from S3"
      command: >
        aws s3 cp s3://{{ artifact_bucket }}/api-portal/{{ git_sha }}/
        {{ release_dir }}/ --recursive
      register: s3_result
      changed_when: true

    - name: "1/7 | Set release directory ownership"
      file:
        path: "{{ release_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    # ══════════════════════════════════════════════════════════════════════
    # Phase 2 — Install
    # ══════════════════════════════════════════════════════════════════════

    - name: "2/7 | Install production dependencies"
      command: npm ci --omit=dev
      args:
        chdir: "{{ release_dir }}"
      become: true
      become_user: "{{ app_user }}"
      changed_when: true

    # ══════════════════════════════════════════════════════════════════════
    # Phase 3 — Configure environment
    # ══════════════════════════════════════════════════════════════════════

    - name: "3/7 | Fetch env vars from SSM Parameter Store"
      command: >
        aws ssm get-parameter
        --name {{ ssm_param }}
        --with-decryption
        --query Parameter.Value
        --output text
      register: ssm_env
      no_log: true
      changed_when: false

    - name: "3/7 | Write env JSON to temp file"
      copy:
        content: "{{ ssm_env.stdout }}"
        dest: "/tmp/.deploy-env-{{ git_sha }}.json"
        mode: "0600"
      no_log: true

    - name: "3/7 | Convert JSON to .env file"
      shell: |
        python3 -c "
        import json, os, pwd
        with open('/tmp/.deploy-env-{{ git_sha }}.json') as f:
            data = json.load(f)
        with open('{{ release_dir }}/.env', 'w') as out:
            for k, v in data.items():
                out.write('{}={}\n'.format(k, str(v).replace('\n', '\\\\n')))
        pw = pwd.getpwnam('{{ app_user }}')
        os.chown('{{ release_dir }}/.env', pw.pw_uid, pw.pw_gid)
        os.chmod('{{ release_dir }}/.env', 0o600)
        os.remove('/tmp/.deploy-env-{{ git_sha }}.json')
        "
      args:
        executable: /bin/bash
      no_log: true
      changed_when: true

    # ══════════════════════════════════════════════════════════════════════
    # Phase 4 — Database migrations
    # ══════════════════════════════════════════════════════════════════════

    - name: "4/7 | Run database migrations"
      shell: |
        set -a && source {{ release_dir }}/.env && set +a
        npx node-pg-migrate up -m {{ release_dir }}/db/migrations
      args:
        executable: /bin/bash
        chdir: "{{ release_dir }}"
      become: true
      become_user: "{{ app_user }}"
      register: migration_result
      # node-pg-migrate exits 0 whether or not migrations ran
      changed_when: "'No migrations' not in migration_result.stdout"

    - name: "4/7 | Migration output"
      debug:
        msg: "{{ migration_result.stdout_lines }}"

    # ══════════════════════════════════════════════════════════════════════
    # Phase 5 — Release
    # ══════════════════════════════════════════════════════════════════════

    - name: "5/7 | Atomically switch current → new release"
      file:
        src: "{{ release_dir }}"
        dest: "{{ current_link }}"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: "5/7 | Reload PM2 (zero-downtime in-process reload)"
      command: pm2 reload api-portal --update-env
      become: true
      become_user: "{{ app_user }}"
      register: pm2_reload
      failed_when: false
      changed_when: true

    - name: "5/7 | Start PM2 if process was not running"
      command: pm2 start {{ current_link }}/ecosystem.config.cjs --env production
      become: true
      become_user: "{{ app_user }}"
      when: pm2_reload.rc != 0
      changed_when: true

    - name: "5/7 | Persist PM2 process list across reboots"
      command: pm2 save
      become: true
      become_user: "{{ app_user }}"
      changed_when: true

    # ══════════════════════════════════════════════════════════════════════
    # Phase 6 — Validate
    # ══════════════════════════════════════════════════════════════════════

    - name: "6/7 | Wait for /health to return 200 (30 s max)"
      uri:
        url: http://localhost:3000/health
        method: GET
        status_code: 200
      register: health_result
      retries: 10
      delay: 3
      until: health_result.status == 200

    - name: "6/7 | Health check passed"
      debug:
        msg: "App is up: {{ health_result.json }}"

    # ══════════════════════════════════════════════════════════════════════
    # Phase 7 — Cleanup
    # ══════════════════════════════════════════════════════════════════════

    - name: "7/7 | Prune old releases (keep newest 3)"
      shell: >
        ls -dt {{ app_dir }}/releases/*/
        2>/dev/null | tail -n +4 | xargs rm -rf || true
      args:
        executable: /bin/bash
      changed_when: false
